name: Windows

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Setup dotnet"
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: "Build"
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet test
